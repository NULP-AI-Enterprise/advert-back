---
# ArgoCD PreSync hook — runs BEFORE each sync, applies idempotent migrations.
# Deleted automatically after success (HookSucceeded policy).
# SQL is inlined into the command — no ConfigMap dependency, so it works at PreSync time.
apiVersion: batch/v1
kind: Job
metadata:
  name: advert-db-migrate-fts
  namespace: advert-back
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: advert-db-secret
                  key: POSTGRES_PASSWORD
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: advert-db-secret
                  key: POSTGRES_USER
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: advert-db-secret
                  key: POSTGRES_DB
          command:
            - /bin/sh
            - -c
            - |
              psql -h advert-postgres.advert-back.svc.cluster.local -v ON_ERROR_STOP=1 <<'SQL'
              -- Migration: FTS + country default cleanup
              -- All statements are idempotent — safe to re-run on every ArgoCD sync.

              -- 1. Remove Ukraine-specific country default (no-op if already dropped)
              ALTER TABLE media_items ALTER COLUMN country DROP DEFAULT;

              -- 2. Add generated tsvector column (no-op if already exists)
              ALTER TABLE media_items
                  ADD COLUMN IF NOT EXISTS search_vector tsvector
                      GENERATED ALWAYS AS (
                          to_tsvector('simple',
                              coalesce(title, '') || ' ' ||
                              coalesce(description, '') || ' ' ||
                              coalesce(category, '') || ' ' ||
                              coalesce(array_to_string(tags, ' '), '')
                          )
                      ) STORED;

              -- 3. GIN index for fast full-text search (no-op if already exists)
              CREATE INDEX IF NOT EXISTS idx_media_items_search_vector
                  ON media_items USING GIN (search_vector);
              SQL
